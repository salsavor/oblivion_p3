openapi: 3.0.3
info:
  title: Oblivion API
  description: >
    API REST para o website Oblivion — plataforma de reviews de jogos, midia
    (filmes, series, anime) e literatura relacionada com jogos.
    Desenvolvido para a UC de Programacao III do curso de Multimedia do ISMT.
  contact:
    email: 12938@ismt.pt
  version: 1.2.0

servers:
  - url: http://localhost:5000/api/v1
    description: Servidor local de desenvolvimento

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Autenticacao e gestao de sessao
  - name: users
    description: Gestao de utilizadores
  - name: jogos
    description: Gestao de jogos
  - name: midia
    description: Gestao de midia (filmes, series, anime, documentarios)
  - name: literatura
    description: Gestao de literatura relacionada com jogos (livros, comics, mangas)
  - name: reviews
    description: Reviews de jogos, midia e literatura
  - name: generos
    description: Generos para classificacao de conteudo
  - name: publishers
    description: Publishers e produtoras
  - name: favoritos
    description: Lista de favoritos do utilizador autenticado

paths:
  /register:
    post:
      tags:
        - auth
      summary: Registar novo utilizador
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Register"
      responses:
        "201":
          description: Utilizador registado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email ou username já existe.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /login:
    post:
      tags:
        - auth
      summary: Autenticar utilizador
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Login"
      responses:
        "200":
          description: Token JWT retornado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth"
        "401":
          description: Credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /refresh-token:
    post:
      tags:
        - auth
      summary: Renovar token JWT
      description: Gera um novo token JWT a partir do token atual, enviado no header. Authorization (Bearer). Não recebe corpo de pedido.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token renovado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth"
        "403":
          description: Token inválido ou expirado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logout:
    post:
      tags:
        - auth
      summary: Terminar sessao
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Token inválido, expirado ou não existente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /users:
    get:
      tags:
        - users
      summary: Listar todos os utilizadores
      operationId: getAllUsers
      responses:
        "200":
          description: Lista de utilizadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: User não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /users/{id}:
    get:
