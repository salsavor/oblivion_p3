openapi: 3.0.3
info:
  title: Oblivion API
  description: >
    API REST para o website Oblivion — plataforma de reviews de jogos, midia
    (filmes, series, anime) e literatura relacionada com jogos.
    Desenvolvido para a UC de Programacao III do curso de Multimedia do ISMT.
  contact:
    email: 12938@ismt.pt
  version: 1.1.0

servers:
  - url: http://localhost:5000/api/v1
    description: Servidor local de desenvolvimento

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Autenticacao e gestao de sessao
  - name: users
    description: Gestao de utilizadores
  - name: jogos
    description: Gestao de jogos
  - name: midia
    description: Gestao de midia (filmes, series, anime, documentarios)
  - name: literatura
    description: Gestao de literatura relacionada com jogos
  - name: reviews
    description: Reviews de jogos, midia e literatura
  - name: generos
    description: Generos para classificacao de conteudo
  - name: publishers
    description: Publishers e produtoras
  - name: favoritos
    description: Lista de favoritos do utilizador autenticado

paths:
  /register:
    post:
      tags: [auth]
      summary: Registar novo utilizador
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Register"
      responses:
        "201":
          description: Utilizador criado com sucesso
        "400":
          $ref: "#/components/schemas/Error"
        "409":
          $ref: "#/components/schemas/Error"

  /login:
    post:
      tags: [auth]
      summary: Autenticar utilizador
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Login"
      responses:
        "200":
          description: Token JWT retornado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth"
        "401":
          $ref: "#/components/schemas/Error"

  /refresh-token:
    post:
      tags: [auth]
      summary: Renovar token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token renovado
        "403":
          $ref: "#/components/schemas/Error"

  /logout:
    post:
      tags: [auth]
      summary: Terminar sessao
      responses:
        "200":
          description: Logout realizado com sucesso

  /users:
    get:
      tags: [users]
      summary: Listar todos os utilizadores
      operationId: getAllUsers
      responses:
        "200":
          description: Lista de utilizadores
        "401":
          $ref: "#/components/schemas/Error"

  /users/{id}:
    get:
      tags: [users]
      summary: Obter utilizador por ID
      operationId: getUserById
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Utilizador encontrado
        "404":
          $ref: "#/components/schemas/Error"
    put:
      tags: [users]
      summary: Atualizar utilizador
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: Utilizador atualizado
        "404":
          $ref: "#/components/schemas/Error"
    delete:
      tags: [users]
      summary: Eliminar utilizador
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Utilizador eliminado
        "404":
          $ref: "#/components/schemas/Error"

  /generos:
    get:
      tags: [generos]
      summary: Listar todos os generos
      operationId: getAllGen
      security: []
      responses:
        "200":
          description: Lista de generos
    post:
      tags: [generos]
      summary: Criar novo genero
      operationId: createGen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Genero"
      responses:
        "201":
          description: Genero criado
        "409":
          $ref: "#/components/schemas/Error"

  /generos/{id}:
    get:
      tags: [generos]
      summary: Obter genero por ID
      operationId: getGenById
      security: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Genero encontrado
        "404":
          $ref: "#/components/schemas/Error"
    put:
      tags: [generos]
      summary: Atualizar genero
      operationId: updateGen
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Genero"
      responses:
        "200":
          description: Genero atualizado
        "404":
          $ref: "#/components/schemas/Error"
    delete:
      tags: [generos]
      summary: Eliminar genero
      operationId: deleteGen
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Genero eliminado
        "404":
          $ref: "#/components/schemas/Error"

  /publishers:
    get:
      tags: [publishers]
      summary: Listar todos os publishers
      operationId: getAllPublishers
      security: []
      responses:
        "200":
          description: Lista de publishers
    post:
      tags: [publishers]
      summary: Criar novo publisher
      operationId: createPublisher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Publisher"
      responses:
        "201":
          description: Publisher criado

  /publishers/{id}:
    get:
      tags: [publishers]
      summary: Obter publisher por ID
      operationId: getPublisherById
      security: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Publisher encontrado
        "404":
          $ref: "#/components/schemas/Error"
    put:
      tags: [publishers]
      summary: Atualizar publisher
      operationId: updatePublisher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Publisher"
      responses:
        "200":
          description: Publisher atualizado
        "404":
          $ref: "#/components/schemas/Error"
    delete:
      tags: [publishers]
      summary: Eliminar publisher
      operationId: deletePublisher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Publisher eliminado
        "404":
          $ref: "#/components/schemas/Error"

  /jogos:
    get:
      tags: [jogos]
      summary: Listar todos os jogos
      operationId: getAllJogos
      security: []
      responses:
        "200":
          description: Lista de jogos
    post:
      tags: [jogos]
      summary: Criar novo jogo
      operationId: createJogo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Jogo"
      responses:
        "201":
          description: Jogo criado
        "400":
          $ref: "#/components/schemas/Error"

  /jogos/{id}:
    get:
      tags: [jogos]
      summary: Obter jogo por ID
      operationId: getJogoById
      security: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Jogo encontrado
        "404":
          $ref: "#/components/schemas/Error"
    put:
      tags: [jogos]
      summary: Atualizar jogo
      operationId: updateJogo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Jogo"
      responses:
        "200":
          description: Jogo atualizado
        "404":
          description: Jogo não encontrado
    delete:
      tags: [jogos]
      summary: Eliminar jogo
      operationId: deleteJogo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Jogo eliminado
        "404":
          $ref: "#/components/schemas/Error"

  /midia:
    get:
      tags: [midia]
      summary: Listar toda a midia
      operationId: getAllMidia
      security: []
      responses:
        "200":
          description: Lista de midia
    post:
      tags: [midia]
      summary: Criar nova midia
      operationId: createMidia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Midia"
      responses:
        "201":
          description: Midia criada

  /midia/{id}:
    get:
      tags: [midia]
      summary: Obter midia por ID
      operationId: getMidiaById
      security: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Midia encontrada
        "404":
          $ref: "#/components/schemas/Error"
    put:
      tags: [midia]
      summary: Atualizar midia
      operationId: updateMidia
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Midia"
      responses:
        "200":
          description: Midia atualizada
        "404":
          $ref: "#/components/schemas/Error"
    delete:
      tags: [midia]
      summary: Eliminar midia
      operationId: deleteMidia
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Midia eliminada
        "404":
          $ref: "#/components/schemas/Error"

  /literatura:
    get:
      tags: [literatura]
      summary: Listar toda a literatura
      operationId: getAllLiteratura
      security: []
      responses:
        "200":
          description: Lista de literatura
    post:
      tags: [literatura]
      summary: Criar nova literatura
      operationId: createLiteratura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Literatura"
      responses:
        "201":
          description: Literatura criada

  /literatura/{id}:
    get:
      tags: [literatura]
      summary: Obter literatura por ID
      operationId: getLiteraturaById
      security: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Literatura encontrada
        "404":
          $ref: "#/components/schemas/Error"
    put:
      tags: [literatura]
      summary: Atualizar literatura
      operationId: updateLiteratura
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Literatura"
      responses:
        "200":
          description: Literatura atualizada
        "404":
          $ref: "#/components/schemas/Error"
    delete:
      tags: [literatura]
      summary: Eliminar literatura
      operationId: deleteLiteratura
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Literatura eliminada
        "404":
          $ref: "#/components/schemas/Error"

  /reviews:
    get:
      tags: [reviews]
      summary: Listar todas as reviews
      operationId: getAllReviews
      security: []
      responses:
        "200":
          description: Lista de reviews
    post:
      tags: [reviews]
      summary: Criar nova review
      operationId: createReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Review"
      responses:
        "201":
          description: Review criada
        "400":
          $ref: "#/components/schemas/Error"

  /reviews/{id}:
    get:
      tags: [reviews]
      summary: Obter review por ID
      operationId: getReviewById
      security: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Review encontrada
        "404":
          $ref: "#/components/schemas/Error"
    delete:
      tags: [reviews]
      summary: Eliminar review (apenas autor ou admin)
      operationId: deleteReview
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Review eliminada
        "403":
          $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/schemas/Error"

  /reviews/alvo/{tipo}/{alvoId}:
    get:
      tags: [reviews]
      summary: Obter reviews de um jogo, midia ou literatura
      operationId: getReviewsByAlvo
      security: []
      parameters:
        - name: tipo
          in: path
          required: true
          schema:
            type: string
            enum: [jogo, midia, literatura]
        - name: alvoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de reviews do alvo
        "400":
          $ref: "#/components/schemas/Error"

  /favoritos:
    get:
      tags: [favoritos]
      summary: Listar favoritos do utilizador autenticado
      operationId: getFavoritos
      responses:
        "200":
          description: Lista de favoritos
    post:
      tags: [favoritos]
      summary: Adicionar item aos favoritos
      operationId: addFavorito
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Favorito"
      responses:
        "201":
          description: Adicionado aos favoritos
        "409":
          $ref: "#/components/schemas/Error"

  /favoritos/{id}:
    delete:
      tags: [favoritos]
      summary: Remover item dos favoritos
      operationId: removeFavorito
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Removido dos favoritos
        "404":
          $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: ID do recurso
      schema:
        type: integer

  schemas:
    Register:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: gamer123
        email:
          type: string
          format: email
        password:
          type: string
        numero_telefone:
          type: string

    Login:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: [1]
        username:
          type: string
          example: [gamer123]
        email:
          type: string
          format: email
          example: [badgal@yahoo.pt]
        password:
          type: string
          example: [password123]
        idade:
          type: integer
          example: [25]

    Genero:
      type: object
      required: [nome, id]
      properties:
        id:
          type: integer
          format: int64
          example: [1]
        nome:
          type: string
          example: [RPG]

    Publisher:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: FromSoftware
        bio:
          type: string

    Jogo:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
        descricao:
          type: string
        ano_lancamento:
          type: integer
        imagem_url:
          type: string
        publisherId:
          type: integer
        generosIds:
          type: array
          items:
            type: integer
          example: [1, 3]

    Midia:
      type: object
      required: [nome, tipo]
      properties:
        nome:
          type: string
        tipo:
          type: string
          enum: [Filme, Serie, Anime, Documentario]
        descricao:
          type: string
        ano_lancamento:
          type: integer
        imagem_url:
          type: string
        publisherId:
          type: integer
        generosIds:
          type: array
          items:
            type: integer

    Literatura:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: [Dark Souls: Design Works]
        autor:
          type: string
          example: [Takeshi Obata]
        descricao:
          type: string
          example: [Livro de arte e design do jogo Dark Souls]
        ano_publicacao:
          type: integer
          example: [2011]
        imagem_url:
          type: string
          example: [https://example.com/dark-souls-design-works.jpg]
        publisherId:
          type: integer
          example: [1]
        generosIds:
          type: array
          items:
            type: integer
          example: [1, 3]

    Review:
      type: object
      required: [titulo, conteudo, pontuacao, tipo_alvo, alvo_id]
      properties:
        titulo:
          type: string
          example: [Review de Dark Souls]
        conteudo:
          type: string
          example:
            [
              Excelente jogo com uma atmosfera única e desafiadora. A jogabilidade é fluida e a história é envolvente,
              tornando-se um dos melhores RPGs de todos os tempos.,
            ]
        pontuacao:
          type: number
          format: float
          minimum: 1
          maximum: 5
        tipo_alvo:
          type: string
          enum: [jogo, midia, literatura]
          example: [jogo]
        alvo_id:
          type: integer
          example: [1]

    Favorito:
      type: object
      required: [tipo_alvo, alvo_id]
      properties:
        userId:
          type: integer

        tipo_alvo:
          type: string
          enum: [jogo, midia, literatura]
        alvo_id:
          type: integer
          example: [1]

    Auth:
      type: object
      properties:
        AccessToken:
          type: string
          description: Token JWT de acesso
          example: [eyJhbGciOiJIUzI1NiIsInR]
        RefreshToken:
          type: string
          description: Token de atualização para renovar o acesso
          example: [dGhpcyByZWZyZXNoIHRva2Vu]

    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
      example:
        message: Recurso não encontrado
        code: 404
