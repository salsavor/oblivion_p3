            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Review não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /reviews/alvo/{tipo}/{alvoId}:
    get:
      tags:
        - reviews
      summary: Obter reviews de um jogo, midia ou literatura
      operationId: getReviewsByAlvo
      security: []
      parameters:
        - name: tipo
          in: path
          required: true
          schema:
            type: string
            enum: [jogo, midia, literatura]
        - name: alvoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de reviews do alvo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Review não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /favoritos:
    get:
      tags:
        - favoritos
      summary: Listar favoritos do utilizador autenticado
      operationId: getFavoritos
      responses:
        "200":
          description: Lista de favoritos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Favorito"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Favorito não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags:
        - favoritos
      summary: Adicionar item aos favoritos
      operationId: addFavorito
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Favorito"
      responses:
        "201":
          description: Adicionado aos favoritos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Favorito"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /favoritos/{id}:
    delete:
      tags:
        - favoritos
      summary: Remover item dos favoritos
      operationId: removeFavorito
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Removido dos favoritos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Favorito não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Requisição inválida.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServerError:
      description: Erro interno do servidor.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: ID do recurso
      schema:
        type: integer

  schemas:
    Register:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: gamer123
        email:
          type: string
          format: email
        password:
          type: string
        numero_telefone:
          type: string

    Login:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        username:
          type: string
          example: gamer123
        email:
          type: string
          format: email
          example: badgal@yahoo.pt
        password:
          type: string
          writeOnly: true
          description: Nunca é devolvida nas respostas; apenas aceite em pedidos.
          example: password123
        numero_telefone:
          type: string
          example: "912345678"
        admin:
          type: boolean
          readOnly: true
          example: false

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operação realizada com sucesso.

    Genero:
      type: object
      required: [nome]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        nome:
          type: string
          example: RPG

    Publisher:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: FromSoftware
        bio:
          type: string

    Jogo:
      type: object
      required: [nome]
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        nome:
          type: string
          example: Dark Souls
        descricao:
          type: string
        ano_lancamento:
          type: integer
          example: 2011
        imagem_url:
          type: string
        publisherId:
          type: integer
          example: 1
        generosIds:
          type: array
          items:
            type: integer
          example: [1, 3]

    Midia:
      type: object
      required: [nome, tipo]
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        nome:
          type: string
        tipo:
          type: string
          enum: [Filme, Serie, Anime, Documentario]
        descricao:
          type: string
        ano_lancamento:
          type: integer
        imagem_url:
          type: string
        publisherId:
          type: integer
        generosIds:
          type: array
          items:
            type: integer

    Literatura:
      type: object
      required: [nome]
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        nome:
          type: string
          example: "Dark Souls: Design Works"
        autor:
          type: string
          example: Takeshi Obata
        descricao:
          type: string
          example: Livro de arte e design do jogo Dark Souls
        ano_publicacao:
          type: integer
          example: 2011
        imagem_url:
          type: string
          example: https://example.com/dark-souls-design-works.jpg
        publisherId:
          type: integer
          example: 1
        generosIds:
          type: array
          items:
            type: integer
          example: [1, 3]

    Review:
      type: object
      required: [titulo, conteudo, pontuacao, tipo_alvo, alvo_id]
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        userId:
          type: integer
          readOnly: true
          description: Atribuído automaticamente a partir do utilizador autenticado.
          example: 7
        titulo:
          type: string
          example: Review de Dark Souls
        conteudo:
          type: string
          example: >
            Excelente jogo com uma atmosfera única e desafiadora. A jogabilidade
            é fluida e a história é envolvente, tornando-se um dos melhores
            RPGs de todos os tempos.
        pontuacao:
          type: number
          format: float
          minimum: 1
          maximum: 5
          example: 4.5
        tipo_alvo:
          type: string
          enum: [jogo, midia, literatura]
          example: jogo
        alvo_id:
          type: integer
          example: 1

    Favorito:
      type: object
      required: [tipo_alvo, alvo_id]
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        userId:
          type: integer
          readOnly: true
          description: Atribuído automaticamente a partir do utilizador autenticado.
          example: 7
        tipo_alvo:
          type: string
          enum: [jogo, midia, literatura]
        alvo_id:
          type: integer
          example: 1

    Auth:
      type: object
      properties:
        AccessToken:
          type: string
          description: Token JWT de acesso
          example: eyJhbGciOiJIUzI1NiIsInR
        RefreshToken:
          type: string
          description: Token de atualização para renovar o acesso
          example: dGhpcyByZWZyZXNoIHRva2Vu

    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
      example:
        message: Recurso não encontrado
        code: 404
