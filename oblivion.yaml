openapi: 3.0.3
info:
  title: Oblivion API
  description: >
    API REST para o website Oblivion — plataforma de reviews de jogos, midia
    (filmes, series, anime) e literatura relacionada com jogos.
    Desenvolvido para a UC de Programacao III do curso de Multimedia do ISMT.
  contact:
    email: 12938@ismt.pt
  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v1
    description: Servidor local de desenvolvimento

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Autenticacao e gestao de sessao
  - name: users
    description: Gestao de utilizadores
  - name: jogos
    description: Gestao de jogos
  - name: midia
    description: Gestao de midia (filmes, series, anime, documentarios)
  - name: literatura
    description: Gestao de literatura relacionada com jogos
  - name: reviews
    description: Reviews de jogos, midia e literatura
  - name: generos
    description: Generos para classificacao de conteudo
  - name: publishers
    description: Publishers e produtoras
  - name: favoritos
    description: Lista de favoritos do utilizador autenticado

paths:

  /register:
    post:
      tags: [auth]
      summary: Registar novo utilizador
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Utilizador criado com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /login:
    post:
      tags: [auth]
      summary: Autenticar utilizador
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Token JWT retornado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /refresh-token:
    post:
      tags: [auth]
      summary: Renovar token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token renovado
        '403':
          $ref: '#/components/responses/Forbidden'

  /logout:
    post:
      tags: [auth]
      summary: Terminar sessao
      responses:
        '200':
          description: Logout realizado com sucesso

  /users:
    get:
      tags: [users]
      summary: Listar todos os utilizadores
      responses:
        '200':
          description: Lista de utilizadores
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{id}:
    get:
      tags: [users]
      summary: Obter utilizador por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Utilizador encontrado
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [users]
      summary: Atualizar utilizador
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateInput'
      responses:
        '200':
          description: Utilizador atualizado
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [users]
      summary: Eliminar utilizador
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Utilizador eliminado
        '404':
          $ref: '#/components/responses/NotFound'

  /generos:
    get:
      tags: [generos]
      summary: Listar todos os generos
      security: []
      responses:
        '200':
          description: Lista de generos
    post:
      tags: [generos]
      summary: Criar novo genero
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneroInput'
      responses:
        '201':
          description: Genero criado
        '409':
          $ref: '#/components/responses/Conflict'

  /generos/{id}:
    get:
      tags: [generos]
      summary: Obter genero por ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Genero encontrado
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [generos]
      summary: Atualizar genero
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneroInput'
      responses:
        '200':
          description: Genero atualizado
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [generos]
      summary: Eliminar genero
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Genero eliminado
        '404':
          $ref: '#/components/responses/NotFound'

  /publishers:
    get:
      tags: [publishers]
      summary: Listar todos os publishers
      security: []
      responses:
        '200':
          description: Lista de publishers
    post:
      tags: [publishers]
      summary: Criar novo publisher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherInput'
      responses:
        '201':
          description: Publisher criado

  /publishers/{id}:
    get:
      tags: [publishers]
      summary: Obter publisher por ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Publisher encontrado
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [publishers]
      summary: Atualizar publisher
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherInput'
      responses:
        '200':
          description: Publisher atualizado
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [publishers]
      summary: Eliminar publisher
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Publisher eliminado
        '404':
          $ref: '#/components/responses/NotFound'

  /jogos:
    get:
      tags: [jogos]
      summary: Listar todos os jogos
      security: []
      responses:
        '200':
          description: Lista de jogos
    post:
      tags: [jogos]
      summary: Criar novo jogo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JogoInput'
      responses:
        '201':
          description: Jogo criado
        '400':
          $ref: '#/components/responses/BadRequest'

  /jogos/{id}:
    get:
      tags: [jogos]
      summary: Obter jogo por ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Jogo encontrado
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [jogos]
      summary: Atualizar jogo
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JogoInput'
      responses:
        '200':
          description: Jogo atualizado
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [jogos]
      summary: Eliminar jogo
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Jogo eliminado
        '404':
          $ref: '#/components/responses/NotFound'

  /midia:
    get:
      tags: [midia]
      summary: Listar toda a midia
      security: []
      responses:
        '200':
          description: Lista de midia
    post:
      tags: [midia]
      summary: Criar nova midia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MidiaInput'
      responses:
        '201':
          description: Midia criada

  /midia/{id}:
    get:
      tags: [midia]
      summary: Obter midia por ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Midia encontrada
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [midia]
      summary: Atualizar midia
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MidiaInput'
      responses:
        '200':
          description: Midia atualizada
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [midia]
      summary: Eliminar midia
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Midia eliminada
        '404':
          $ref: '#/components/responses/NotFound'

  /literatura:
    get:
      tags: [literatura]
      summary: Listar toda a literatura
      security: []
      responses:
        '200':
          description: Lista de literatura
    post:
      tags: [literatura]
      summary: Criar nova literatura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiteraturaInput'
      responses:
        '201':
          description: Literatura criada

  /literatura/{id}:
    get:
      tags: [literatura]
      summary: Obter literatura por ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Literatura encontrada
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [literatura]
      summary: Atualizar literatura
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiteraturaInput'
      responses:
        '200':
          description: Literatura atualizada
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [literatura]
      summary: Eliminar literatura
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Literatura eliminada
        '404':
          $ref: '#/components/responses/NotFound'

  /reviews:
    get:
      tags: [reviews]
      summary: Listar todas as reviews
      security: []
      responses:
        '200':
          description: Lista de reviews
    post:
      tags: [reviews]
      summary: Criar nova review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '201':
          description: Review criada
        '400':
          $ref: '#/components/responses/BadRequest'

  /reviews/{id}:
    get:
      tags: [reviews]
      summary: Obter review por ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Review encontrada
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [reviews]
      summary: Atualizar review (apenas autor ou admin)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdateInput'
      responses:
        '200':
          description: Review atualizada
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [reviews]
      summary: Eliminar review (apenas autor ou admin)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Review eliminada
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /reviews/alvo/{tipo}/{alvoId}:
    get:
      tags: [reviews]
      summary: Obter reviews de um jogo, midia ou literatura
      security: []
      parameters:
        - name: tipo
          in: path
          required: true
          schema:
            type: string
            enum: [jogo, midia, literatura]
        - name: alvoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de reviews do alvo
        '400':
          $ref: '#/components/responses/BadRequest'

  /favoritos:
    get:
      tags: [favoritos]
      summary: Listar favoritos do utilizador autenticado
      responses:
        '200':
          description: Lista de favoritos
    post:
      tags: [favoritos]
      summary: Adicionar item aos favoritos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoritoInput'
      responses:
        '201':
          description: Adicionado aos favoritos
        '409':
          $ref: '#/components/responses/Conflict'

  /favoritos/{id}:
    delete:
      tags: [favoritos]
      summary: Remover item dos favoritos
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Removido dos favoritos
        '404':
          $ref: '#/components/responses/NotFound'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: ID do recurso
      schema:
        type: integer

  responses:
    BadRequest:
      description: Dados invalidos ou em falta
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Token em falta ou invalido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Sem permissao para este recurso
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Recurso nao encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Recurso ja existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: error
        message:
          type: string

    TokenResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        AccessToken:
          type: string

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: gamer123
        email:
          type: string
          format: email
        password:
          type: string
        numero_telefone:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserUpdateInput:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        numero_telefone:
          type: string

    GeneroInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: RPG

    PublisherInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: FromSoftware
        bio:
          type: string

    JogoInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
        descricao:
          type: string
        ano_lancamento:
          type: integer
        imagem_url:
          type: string
        publisherId:
          type: integer
        generosIds:
          type: array
          items:
            type: integer
          example: [1, 3]

    MidiaInput:
      type: object
      required: [nome, tipo]
      properties:
        nome:
          type: string
        tipo:
          type: string
          enum: [Filme, Serie, Anime, Documentario]
        descricao:
          type: string
        ano_lancamento:
          type: integer
        imagem_url:
          type: string
        publisherId:
          type: integer
        generosIds:
          type: array
          items:
            type: integer

    LiteraturaInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
        autor:
          type: string
        descricao:
          type: string
        ano_publicacao:
          type: integer
        imagem_url:
          type: string
        publisherId:
          type: integer
        generosIds:
          type: array
          items:
            type: integer

    ReviewInput:
      type: object
      required: [titulo, conteudo, pontuacao, tipo_alvo, alvo_id]
      properties:
        titulo:
          type: string
        conteudo:
          type: string
        pontuacao:
          type: integer
          minimum: 1
          maximum: 10
        tipo_alvo:
          type: string
          enum: [jogo, midia, literatura]
        alvo_id:
          type: integer

    ReviewUpdateInput:
      type: object
      properties:
        titulo:
          type: string
        conteudo:
          type: string
        pontuacao:
          type: integer
          minimum: 1
          maximum: 10

    FavoritoInput:
      type: object
      required: [tipo_alvo, alvo_id]
      properties:
        tipo_alvo:
          type: string
          enum: [jogo, midia, literatura]
        alvo_id:
          type: integer
